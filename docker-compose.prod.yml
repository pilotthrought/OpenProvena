###############################################################################
# OpenProvena — Docker Compose PRODUCTION
#
# Différences clés vs dev :
#   - Ports DB/cache/queue NON exposés à l'hôte (réseau interne uniquement)
#   - Secrets via Docker secrets (fichiers), jamais en clair dans l'environnement
#   - restart: always + limites CPU/RAM par service
#   - Traefik comme reverse-proxy avec TLS automatique (Let's Encrypt)
#   - Logs JSON avec rotation
#   - Healthchecks stricts avant bascule de trafic
#
# Usage :
#   cp .env.production.example .env.production
#   # éditer .env.production avec les vraies valeurs
#   ./scripts/generate-secrets.sh
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
###############################################################################

name: openprovena-prod

networks:
  # Réseau public — uniquement Traefik + frontend/api exposés
  edge:
    driver: bridge
  # Réseau interne — bases de données, cache, queue. Jamais exposé à l'hôte.
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  rabbitmq_data:
  traefik_certs:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  neo4j_password:
    file: ./secrets/neo4j_password.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt
  secret_key:
    file: ./secrets/secret_key.txt
  grafana_password:
    file: ./secrets/grafana_password.txt

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart-policy: &restart-policy
  restart: always

services:

  # ── Reverse Proxy / TLS ──────────────────────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: provena_traefik
    <<: *restart-policy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      - "--api.dashboard=false"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/certs
    networks:
      - edge
    logging: *default-logging

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provena_api
    <<: *restart-policy
    environment:
      ENVIRONMENT: production
      POSTGRES_URL: postgresql+asyncpg://provena:$$(cat /run/secrets/postgres_password)@postgres:5432/openprovena
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      CELERY_BROKER_URL: amqp://provena:$$(cat /run/secrets/rabbitmq_password)@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ALLOWED_HOSTS: '["api.${DOMAIN}"]'
      CORS_ORIGINS: '["https://${DOMAIN}"]'
      LOG_LEVEL: WARNING
    secrets:
      - postgres_password
      - neo4j_password
      - rabbitmq_password
      - secret_key
    entrypoint: >
      sh -c '
        export SECRET_KEY=$$(cat /run/secrets/secret_key) &&
        export NEO4J_PASSWORD=$$(cat /run/secrets/neo4j_password) &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --proxy-headers --forwarded-allow-ips="*"
      '
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - edge
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      # Security headers
      - "traefik.http.middlewares.api-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.api-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.api-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.api-headers.headers.contentTypeNosniff=true"
      - "traefik.http.routers.api.middlewares=api-headers"

  # ── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provena_worker
    <<: *restart-policy
    command: celery -A app.worker worker --loglevel=warning --concurrency=4 -Q trust,crawl,default
    environment:
      ENVIRONMENT: production
      POSTGRES_URL: postgresql+asyncpg://provena:$$(cat /run/secrets/postgres_password)@postgres:5432/openprovena
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://provena:$$(cat /run/secrets/rabbitmq_password)@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    secrets:
      - postgres_password
      - rabbitmq_password
      - secret_key
    entrypoint: >
      sh -c '
        export SECRET_KEY=$$(cat /run/secrets/secret_key) &&
        exec celery -A app.worker worker --loglevel=warning --concurrency=4 -Q trust,crawl,default
      '
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    logging: *default-logging

  # ── Celery Beat ──────────────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provena_beat
    <<: *restart-policy
    secrets:
      - rabbitmq_password
      - secret_key
    entrypoint: >
      sh -c '
        export SECRET_KEY=$$(cat /run/secrets/secret_key) &&
        exec celery -A app.worker beat --loglevel=warning
      '
    environment:
      CELERY_BROKER_URL: amqp://provena:$$(cat /run/secrets/rabbitmq_password)@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging

  # ── PostgreSQL — réseau interne uniquement, aucun port exposé ────────────
  postgres:
    image: postgres:16-alpine
    container_name: provena_postgres
    <<: *restart-policy
    environment:
      POSTGRES_USER: provena
      POSTGRES_DB: openprovena
      # POSTGRES_PASSWORD est lu depuis le fichier secret via l'entrypoint
    secrets:
      - postgres_password
    entrypoint:
      - sh
      - -c
      - |
        export POSTGRES_PASSWORD=$(cat /run/secrets/postgres_password)
        exec docker-entrypoint.sh postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provena -d openprovena"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    logging: *default-logging

  # ── Redis — réseau interne, avec mot de passe ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: provena_redis
    <<: *restart-policy
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --protected-mode yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
    logging: *default-logging

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: provena_rabbitmq
    <<: *restart-policy
    environment:
      RABBITMQ_DEFAULT_USER: provena
      # RABBITMQ_DEFAULT_PASS est lu depuis le fichier secret via l'entrypoint
    secrets:
      - rabbitmq_password
    entrypoint:
      - sh
      - -c
      - |
        export RABBITMQ_DEFAULT_PASS=$(cat /run/secrets/rabbitmq_password)
        exec docker-entrypoint.sh rabbitmq-server
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
    logging: *default-logging

  # ── Elasticsearch ────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.15.2
    container_name: provena_elasticsearch
    <<: *restart-policy
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD_FILE: /run/secrets/postgres_password  # réutilise un secret existant si besoin dédié, sinon créer elastic_password
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:$$(cat /run/secrets/postgres_password) http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 8
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    logging: *default-logging

  # ── Neo4j ────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.23-community
    container_name: provena_neo4j
    <<: *restart-policy
    environment:
      NEO4J_AUTH_FILE: /run/secrets/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
    secrets:
      - neo4j_password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1.5G
    logging: *default-logging

  # ── Flower — protégé par Traefik basic auth, pas exposé directement ──────
  flower:
    image: mher/flower:2.0
    container_name: provena_flower
    <<: *restart-policy
    environment:
      CELERY_BROKER_URL: amqp://provena:$$(cat /run/secrets/rabbitmq_password)@rabbitmq:5672//
    secrets:
      - rabbitmq_password
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - edge
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.${DOMAIN}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.routers.flower.middlewares=flower-auth"
      - "traefik.http.middlewares.flower-auth.basicauth.usersfile=/run/secrets/traefik_htpasswd"
    logging: *default-logging

  # ── Prometheus — interne, accessible via Grafana uniquement ──────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: provena_prometheus
    <<: *restart-policy
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: provena_grafana
    <<: *restart-policy
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN}"
    secrets:
      - grafana_password
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - edge
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
    logging: *default-logging

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    container_name: provena_frontend
    <<: *restart-policy
    environment:
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768M
    logging: *default-logging
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.frontend-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.frontend-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.frontend-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.frontend-headers.headers.browserXssFilter=true"
      - "traefik.http.routers.frontend.middlewares=frontend-headers"
