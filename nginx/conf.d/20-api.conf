server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.openprovena.org;

    ssl_certificate     /etc/letsencrypt/live/openprovena.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openprovena.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "no-referrer"                                  always;

    # ── Rate limiting API plus strict ─────────────────────────────────────
    limit_req  zone=api burst=20 nodelay;
    limit_conn addr 10;

    # ── CORS preflight ────────────────────────────────────────────────────
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "https://openprovena.org";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-OpenProvena-Version";
            add_header Access-Control-Max-Age       86400;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Health check public (pas de rate limit) ───────────────────────────
    location = /health {
        proxy_pass http://api:8000/health;
        access_log off;
    }
}
