server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 off;
    server_name openprovena.org;

    ssl_certificate     /etc/letsencrypt/live/openprovena.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openprovena.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                                         always;
    add_header X-Content-Type-Options     "nosniff"                                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline' 'unsafe-eval';
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: https:;
         connect-src 'self' https://api.openprovena.org;
         frame-ancestors 'none'"
        always;

    # ── Rate limiting ─────────────────────────────────────────────────────
    limit_req  zone=global burst=50 nodelay;
    limit_conn addr 20;

    # ── Proxy Next.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Fichiers statiques Next.js (cache agressif) ───────────────────────
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Favicon / robots ──────────────────────────────────────────────────
    location = /favicon.ico { proxy_pass http://frontend:3000; access_log off; }
    location = /robots.txt  { proxy_pass http://frontend:3000; access_log off; }
}
