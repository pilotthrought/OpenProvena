# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name openprovena.org api.openprovena.org;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (accessible en HTTP pour le monitoring)
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"nginx"}\n';
        add_header Content-Type application/json;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
