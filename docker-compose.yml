###############################################################################
# OpenProvena — Production
# openprovena.org | Debian 12 | Docker
###############################################################################
name: openprovena

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
  nginx_logs:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  secret_key:
    file: ./secrets/secret_key.txt
  rabbitmq_password:
    file: ./secrets/rabbitmq_password.txt

x-restart: &restart
  restart: unless-stopped

x-log: &log
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ── Nginx + TLS ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: provena_nginx
    <<: [*restart, *log]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --spider http://localhost:80/health || wget -qO- --spider http://localhost:443/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Certbot Let's Encrypt ─────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: provena_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    <<: *log

  # ── FastAPI ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: provena_api
    <<: [*restart, *log]
    secrets:
      - postgres_password
      - redis_password
      - secret_key
      - rabbitmq_password
    environment:
      ENVIRONMENT: production
      REDIS_URL: redis://:$(cat /run/secrets/redis_password)@redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      CELERY_RESULT_BACKEND: redis://:$(cat /run/secrets/redis_password)@redis:6379/1
      ALLOWED_HOSTS: '["api.openprovena.org","openprovena.org","localhost","127.0.0.1"]'
      CORS_ORIGINS: '["https://openprovena.org"]'
      LOG_LEVEL: WARNING
    entrypoint:
      - sh
      - -c
      - |
        export SECRET_KEY=$(cat /run/secrets/secret_key)
        export POSTGRES_URL="postgresql+asyncpg://provena:$(cat /run/secrets/postgres_password)@postgres:5432/openprovena"
        export REDIS_URL="redis://:$(cat /run/secrets/redis_password)@redis:6379/0"
        export CELERY_BROKER_URL="amqp://provena:$(cat /run/secrets/rabbitmq_password)@rabbitmq:5672//"
        export CELERY_RESULT_BACKEND="redis://:$(cat /run/secrets/redis_password)@redis:6379/1"
        exec uvicorn app.main:app \
          --host 0.0.0.0 --port 8000 \
          --workers 4 \
          --proxy-headers \
          --forwarded-allow-ips="*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - edge
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: api.openprovena.org", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  # ── Next.js Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: provena_frontend
    <<: [*restart, *log]
    environment:
      NEXT_PUBLIC_API_URL: https://api.openprovena.org
    depends_on:
      api:
        condition: service_healthy
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000 || wget -qO- --spider http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: provena_worker
    <<: [*restart, *log]
    secrets:
      - postgres_password
      - redis_password
      - secret_key
      - rabbitmq_password
    environment:
      ENVIRONMENT: production
    entrypoint:
      - sh
      - -c
      - |
        export SECRET_KEY=$(cat /run/secrets/secret_key)
        export POSTGRES_URL="postgresql+asyncpg://provena:$(cat /run/secrets/postgres_password)@postgres:5432/openprovena"
        export REDIS_URL="redis://:$(cat /run/secrets/redis_password)@redis:6379/0"
        export CELERY_BROKER_URL="amqp://provena:$(cat /run/secrets/rabbitmq_password)@rabbitmq:5672//"
        export CELERY_RESULT_BACKEND="redis://:$(cat /run/secrets/redis_password)@redis:6379/1"
        exec celery -A app.worker worker \
          --loglevel=warning --concurrency=2 -Q trust,crawl,default
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.worker inspect ping || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: provena_postgres
    <<: [*restart, *log]
    secrets:
      - postgres_password
    environment:
      POSTGRES_USER: provena
      POSTGRES_DB: openprovena
    entrypoint:
      - sh
      - -c
      - |
        export POSTGRES_PASSWORD=$(cat /run/secrets/postgres_password)
        exec docker-entrypoint.sh postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provena -d openprovena"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis (avec mot de passe) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: provena_redis
    <<: [*restart, *log]
    secrets:
      - redis_password
    entrypoint:
      - sh
      - -c
      - exec redis-server --requirepass "$(cat /run/secrets/redis_password)"
              --appendonly yes
              --maxmemory 256mb
              --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test:
        - CMD
        - sh
        - -c
        - redis-cli -a "$(cat /run/secrets/redis_password)" ping
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 384M

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: provena_rabbitmq
    <<: [*restart, *log]
    secrets:
      - rabbitmq_password
    environment:
      RABBITMQ_DEFAULT_USER: provena
    entrypoint:
      - sh
      - -c
      - |
        export RABBITMQ_DEFAULT_PASS=$(cat /run/secrets/rabbitmq_password)
        exec docker-entrypoint.sh rabbitmq-server
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 384M
