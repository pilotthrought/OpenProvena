###############################################################################
# OpenProvena — Docker Compose (development)
###############################################################################

name: openprovena

networks:
  provena_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  rabbitmq_data:

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provena_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      POSTGRES_URL: postgresql+asyncpg://provena:provena@postgres:5432/openprovena
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: provena_neo4j
      CELERY_BROKER_URL: amqp://provena:provena@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_in_production}
      # Listes passées comme JSON strings — parsées par config.py
      ALLOWED_HOSTS: '["*"]'
      CORS_ORIGINS: '["http://localhost:3000","https://openprovena.org"]'
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      # Elasticsearch retiré des dépendances bloquantes :
      # l'API démarre sans ES et s'y connecte à la demande
    networks:
      - provena_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      # Laisse 60s à uvicorn + init_db() pour démarrer avant le premier check
      start_period: 60s

  # ── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provena_worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=2 -Q trust,crawl,default
    environment:
      ENVIRONMENT: development
      POSTGRES_URL: postgresql+asyncpg://provena:provena@postgres:5432/openprovena
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://provena:provena@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_in_production}
      ALLOWED_HOSTS: '["*"]'
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - provena_net

  # ── Celery Beat ──────────────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: provena_beat
    restart: unless-stopped
    command: celery -A app.worker beat --loglevel=info
    environment:
      CELERY_BROKER_URL: amqp://provena:provena@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_in_production}
      ALLOWED_HOSTS: '["*"]'
      CORS_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - provena_net

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: provena_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: provena
      POSTGRES_PASSWORD: provena
      POSTGRES_DB: openprovena
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - provena_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provena -d openprovena"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: provena_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - provena_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: provena_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: provena
      RABBITMQ_DEFAULT_PASS: provena
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - provena_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Elasticsearch ────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.15.2
    container_name: provena_elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - provena_net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 8
      start_period: 90s

  # ── Neo4j ────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.23-community
    container_name: provena_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/provena_neo4j
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - provena_net

  # ── Flower ───────────────────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: provena_flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: amqp://provena:provena@rabbitmq:5672//
      FLOWER_BASIC_AUTH: admin:admin
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - provena_net

  # ── Prometheus ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: provena_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - provena_net

  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    container_name: provena_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - provena_net

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: provena_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - provena_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
